<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon background -->
  <polygon
    points="32,2 58,17 58,47 32,62 6,47 6,17"
    fill="url(#g2)"
    stroke="url(#g1)"
    stroke-width="1.5"
  />

  <!-- Inner accent ring -->
  <polygon
    points="32,7 53,19.5 53,44.5 32,57 11,44.5 11,19.5"
    fill="none"
    stroke="url(#g1)"
    stroke-width="0.4"
    opacity="0.35"
  />

  <!-- S letter -->
  <text
    x="14"
    y="42"
    font-family="'Inter', 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="800"
    fill="url(#g1)"
    filter="url(#glow)"
    letter-spacing="-1"
  >SP</text>

  <!-- bottom code accent dots -->
  <circle cx="24" cy="55" r="1.2" fill="#818cf8" opacity="0.6"/>
  <circle cx="32" cy="58" r="1.2" fill="#22d3ee" opacity="0.6"/>
  <circle cx="40" cy="55" r="1.2" fill="#818cf8" opacity="0.6"/>
</svg>
